# ┃                    Workspaces Configuration                 ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Workspace Rules https://wiki.hyprland.org/Configuring/Workspace-Rules/

# Primary monitor (laptop) gets workspaces 1-3
# Primary monitor (laptop) gets workspaces 1-3
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1

# Secondary monitor gets workspaces 4-6 when connected (falls back to eDP-1 automatically)
workspace = 4, monitor:HDMI-A-1, default:true
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:HDMI-A-1

# Dedicated app workspaces - prefer HDMI-A-1 when connected
workspace = 7, defaultName:discord, layout:monocle
workspace = 8, monitor:HDMI-A-1, defaultName:steam
workspace = 10, monitor:HDMI-A-1, defaultName:ffxiv
